[theme]
primaryColor = "#1E90FF"                # Dodger Blue for actions
backgroundColor = "#1A1A1A"             # Charcoal Black background
secondaryBackgroundColor = "#2C2C2E"    # Dark gray container background
textColor = "#F1F1F1"                   # Light text
font = "sans serif"                     # Modern clean font

[server]
headless = true
port = 8501
enableCORS = false

[client]
toolbarMode = "minimal"
