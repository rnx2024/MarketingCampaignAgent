# .streamlit/config.toml

[theme]
primaryColor = "#3B82F6"                # Light blue (button color)
backgroundColor = "#1E3A8A"             # Dark blue background
secondaryBackgroundColor = "#1E40AF"    # Container background (slightly darker)
textColor = "#FFFFFF"                   # White text
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false

[client]
toolbarMode = "minimal"

[server]
runOnSave = false

